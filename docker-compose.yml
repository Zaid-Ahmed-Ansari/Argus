# Local PostgreSQL for Argus development.
# Production uses Supabase — see docs/supabase-setup.md
services:
  db:
    image: postgres:16-alpine
    container_name: argus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - argus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d argus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  argus_pg_data:
